# .github/workflows/release-stable.yml
name: Release Stable

# Promote a prerelease to a stable release. Copy the prerelease version to
# promote from the releases page and paste it as the input; the stable
# version is derived automatically (e.g. v1.2.3-rc.2 -> v1.2.3). The stable
# tag is created on the prerelease's commit, so this can be dispatched from
# any branch.
on:
  workflow_dispatch:
    inputs:
      prerelease-version:
        description: 'Prerelease tag to promote (e.g. v1.2.3-rc.2)'
        required: true

concurrency:
  group: "prod-deployment"

jobs:
  release-stable:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Write is required to create/update/delete releases AND to write tags
    steps:
      # The actions are pinned to the previous release so a broken change
      # cannot break its own release path.
      - name: Perform pre-release actions
        uses: danielemery/github-release-actions/perform-pre-release@v0.5.0
        id: pre_release
        with:
          release-version: ${{ inputs.prerelease-version }}
          promote-to-stable: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # This repository has no deployment step: publishing the release IS the
      # deployment. Downstream projects would deploy between pre and post.
      - name: Perform post-release actions
        uses: danielemery/github-release-actions/perform-post-release@v0.5.0
        with:
          release-id: ${{ steps.pre_release.outputs.release-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
