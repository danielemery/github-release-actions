# .github/workflows/release-stable.yml
name: Release Stable

# Promote a prerelease to a stable release. Run this workflow FROM THE
# PRERELEASE TAG being promoted (so the stable tag is created on the same
# commit), providing the stable version it should become.
on:
  workflow_dispatch:
    inputs:
      release-version:
        description: 'Stable v-prefixed version to release (e.g. v1.2.3)'
        required: true

concurrency:
  group: "prod-deployment"

jobs:
  release-stable:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Write is required to create/update/delete releases AND to write tags
    steps:
      - name: Validate release-version input
        env:
          RELEASE_VERSION: ${{ inputs.release-version }}
        run: |
          if [[ ! "$RELEASE_VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::release-version must be a stable v-prefixed version like v1.2.3 (the version the prerelease becomes), got '$RELEASE_VERSION'."
            exit 1
          fi

      # The actions are pinned to the previous release so a broken change
      # cannot break its own release path.
      #
      # TODO: once the pins reach a release with perform-pre-release's
      # promote-to-stable input, drop this create-prerelease step and instead
      # pass the rc tag as release-version with promote-to-stable: true
      # (taking the rc tag as the workflow input rather than the stable
      # version).
      - name: Create stable tag and intermediate prerelease
        uses: danielemery/github-release-actions/create-prerelease@v0.4.0
        with:
          release-version: ${{ inputs.release-version }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Stopgap for the v0.4.x pins: the release list API is eventually
      # consistent, so perform-pre-release can miss the release created just
      # above (this broke the v0.4.1 release). Fixed properly in newer
      # versions via a direct tag lookup; remove with the rewrite below.
      - name: Wait for the release list to settle
        run: sleep 30

      - name: Perform pre-release actions
        uses: danielemery/github-release-actions/perform-pre-release@v0.4.0
        id: pre_release
        with:
          release-version: ${{ inputs.release-version }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # This repository has no deployment step: publishing the release IS the
      # deployment. Downstream projects would deploy between pre and post.
      - name: Perform post-release actions
        uses: danielemery/github-release-actions/perform-post-release@v0.4.0
        with:
          release-id: ${{ steps.pre_release.outputs.release-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
